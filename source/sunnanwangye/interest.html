<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>兴趣爱好</title>
    <link rel="stylesheet" href="./subpage.css" />
  </head>
  <body>
    <header>
      <div class="container head">
        <a class="brand" href="./index.html.html"><span class="brand-dot"></span><span>个人主页</span></a>
        <a class="back" href="./index.html.html">← 返回首页</a>
      </div>
    </header>
    <main class="container">
      <section class="hobby-hero">
        <div class="container">
          <div>
            <div class="hobby-title">兴趣爱好</div>
            <div class="hobby-sub">把好奇心落到实处：探寻、AI 生成、运动</div>
          </div>
        </div>
      </section>

      <section id="list" class="section">
        <div class="topic-section" id="sport">
          <h3 class="topic-title">运动</h3>
          <p class="topic-desc">跑步与日常力量训练，关注心率与步频，享受流汗的过程。</p>
          <div class="nine-grid">
            <div class="nine-cell"><img src="./吃饭.jpg" alt="运动1"></div>
            <div class="nine-cell"><img src="./吃饭2.jpg" alt="运动2"></div>
            <div class="nine-cell"><img src="./号码牌.jpg" alt="运动3"></div>
            <div class="nine-cell"><img src="./奖牌.jpg" alt="运动4"></div>
            <div class="nine-cell"><img src="./开始.jpg" alt="运动5"></div>
            <div class="nine-cell"><img src="./群众.jpg" alt="运动6"></div>
            <div class="nine-cell"><img src="./证书.jpg" alt="运动7"></div>
            <div class="nine-cell"><img src="./终点.jpg" alt="运动8"></div>
            <div class="nine-cell"><img src="./准备.jpg" alt="运动9"></div>
          </div>
        </div>

        <div class="topic-section" id="explore">
          <h3 class="topic-title">探寻</h3>
          <p class="topic-desc">城市与自然的现场记录，偏爱极简与高反差氛围。</p>
          <div class="nine-grid">
            <div class="nine-cell"><img src="./探1.jpg" alt="探寻1"></div>
            <div class="nine-cell"><img src="./探2.jpg" alt="探寻2"></div>
            <div class="nine-cell"><img src="./探3.jpg" alt="探寻3"></div>
            <div class="nine-cell"><img src="./探4.jpg" alt="探寻4"></div>
            <div class="nine-cell"><img src="./探5.jpg" alt="探寻5"></div>
            <div class="nine-cell"><img src="./探6.jpg" alt="探寻6"></div>
            <div class="nine-cell"><img src="./探7.jpg" alt="探寻7"></div>
            <div class="nine-cell"><img src="./探8.jpg" alt="探寻8"></div>
            <div class="nine-cell"><img src="./探9.jpg" alt="探寻9"></div>
          </div>
        </div>

        <div class="topic-section" id="aigen">
          <h3 class="topic-title">AI 生成</h3>
          <p class="topic-desc">提示工程与构图风格实验，做“有意义”的图像。</p>
          <div class="nine-grid">
            <div class="nine-cell"><img src="./AI1.jpg" alt="AI 1"></div>
            <div class="nine-cell"><img src="./AI2.jpg" alt="AI 2"></div>
            <div class="nine-cell"><img src="./AI3.jpg" alt="AI 3"></div>
          </div>
        </div>
      </section>

      <section class="section" hidden>
        <h2 class="title" style="margin-bottom:10px">灵感收集</h2>
        <p class="desc">把过程与片段留住，方便后续整理成专题。</p>
        <div class="uploader" style="margin-top:12px">
          <div class="uploader-drop">
            <div>
              <strong>拖拽图片到此处</strong> 或
              <button class="btn btn-primary" type="button">选择图片</button>
              <small>支持 JPG/PNG/WebP；本地预览，不会上传到服务器</small>
            </div>
            <input class="uploader-input" type="file" accept="image/*" multiple />
          </div>
          <div class="gallery" aria-live="polite"></div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <div class="container">© <span id="y1"></span> Personal Home</div>
    </footer>
    <script src="./subpage.js"></script>
  </body>
  </html>
