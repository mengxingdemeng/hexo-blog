---
layout: false
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔒 博客访问验证</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 让 body 不影响布局，文字自然在最顶部 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f121a;
      min-height: 100vh;
      color: #fff;
      padding-top: 1px; /* 关键：让布局正常但不影响遮盖 */
    }

    /* 🔥 核心：登录框绝对定位 + 铺满屏幕 + 盖住顶部文字 */
    .login-box {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: #0f121a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999999; /* 最高层级，盖住一切 */
    }

    /* 内部白色卡片 */
    .card {
      width: 100%;
      max-width: 400px;
      background: #1a1f2e;
      border-radius: 16px;
      padding: 44px 36px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.06);
      animation: up 0.6s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes up {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title {
      text-align: center;
      font-size: 24px;
      margin-bottom: 32px;
      color: #e8e8e8;
      font-weight: 500;
    }

    .input {
      width: 100%;
      padding: 14px 16px;
      background: #242a3a;
      border: 1px solid #2d3446;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      outline: none;
      margin-bottom: 20px;
      transition: 0.2s;
    }

    .input:focus {
      border-color: #588cf7;
      background: #262c3d;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #4a83f0;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #3b71e0;
    }

    .tip {
      margin-top: 16px;
      text-align: center;
      color: #ff6b6b;
      font-size: 13px;
      min-height: 16px;
    }
  </style>
</head>

<body>

  <!-- 🔥 这个整屏盒子 100% 盖住顶部的 --- 文字 -->
  <div class="login-box">
    <div class="card">
      <div class="title">博客访问验证</div>
      <input class="input" id="pwd" type="password" placeholder="请输入访问密码">
      <button class="btn" onclick="check()">进入博客</button>
      <div class="tip" id="tip"></div>
    </div>
  </div>

  <script>
    const CORRECT = "8dc171c0bd5c528aa1568c537e2242f6a60c3777aad5a5e1134b43af385b8d49";

    async function sha256(t) {
      const e = new TextEncoder().encode(t);
      const n = await crypto.subtle.digest("SHA-256", e);
      return Array.from(new Uint8Array(n)).map(o => o.toString(16).padStart(2, "0")).join("");
    }

    async function check() {
      const pwd = document.getElementById("pwd").value;
      const hash = await sha256(pwd);
      if (hash === CORRECT) {
        localStorage.blogAuth = "ok";
        location.href = "/hexo-blog/";
      } else {
        document.getElementById("tip").innerText = "密码错误，请重试";
      }
    }
  </script>
</body>
</html>
