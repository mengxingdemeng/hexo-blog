<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .header {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-box .label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box .value {
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
        }

        .btn {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 255, 136, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary:hover {
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
        }

        .game-area {
            position: relative;
            display: inline-block;
        }

        canvas {
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(0, 255, 136, 0.1);
            border: 3px solid rgba(0, 255, 136, 0.3);
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            font-size: 42px;
            color: #ff4757;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
        }

        .game-over p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
        }

        .game-over p span {
            color: #00ff88;
            font-weight: bold;
            font-size: 28px;
        }

        .instructions {
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .instructions p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin: 5px 0;
        }

        .instructions span {
            display: inline-block;
            background: rgba(0, 255, 136, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            color: #00ff88;
            font-family: monospace;
            font-size: 12px;
        }

        .boost-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 71, 87, 0.8);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .boost-indicator.show {
            opacity: 1;
        }

        .history-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .history-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .history-panel {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 30px;
            min-width: 350px;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .history-modal.show .history-panel {
            transform: scale(1);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .history-header h2 {
            font-size: 28px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            padding: 0 10px;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: white;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 320px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: background 0.2s, transform 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .history-item .rank {
            font-weight: bold;
            color: rgba(255, 255, 255, 0.5);
            width: 35px;
            font-size: 14px;
        }

        .history-item .rank.top3 {
            color: #ffd700;
            font-size: 18px;
        }

        .history-item .score {
            font-size: 22px;
            font-weight: bold;
            color: #00ff88;
            flex: 1;
            text-align: left;
            padding-left: 15px;
        }

        .history-item .date {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        .history-empty {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            padding: 50px 0;
            font-size: 16px;
        }

        .clear-history-btn {
            width: 100%;
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .clear-history-btn:hover {
            background: rgba(255, 71, 87, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 贪吃蛇</h1>
        <div class="header">
            <div class="score-box">
                <div class="label">当前分数</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">最高分</div>
                <div class="value" id="best">0</div>
            </div>
            <button class="btn" id="newGameBtn">新游戏</button>
            <button class="btn btn-secondary" id="historyBtn">🏆 排行榜</button>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="boost-indicator" id="boostIndicator">⚡ 加速中</div>
            <div class="game-over" id="gameOver">
                <h2>游戏结束!</h2>
                <p>最终分数: <span id="finalScore">0</span></p>
                <button class="btn" id="retryBtn">再来一局</button>
            </div>
        </div>

        <div class="instructions">
            <p><span>↑</span> <span>↓</span> <span>←</span> <span>→</span> 或 <span>W</span><span>A</span><span>S</span><span>D</span> 控制方向</p>
            <p><span>长按</span> 方向键或 <span>空格键</span> 加速 | 吃到食物得分，撞到墙壁或自己游戏结束</p>
        </div>
    </div>

    <div class="history-modal" id="historyModal">
        <div class="history-panel">
            <div class="history-header">
                <h2>🏆 排行榜</h2>
                <button class="close-btn" id="closeHistoryBtn">&times;</button>
            </div>
            <ul class="history-list" id="historyList">
                <li class="history-empty">暂无记录</li>
            </ul>
            <button class="clear-history-btn" id="clearHistoryBtn">清空记录</button>
        </div>
    </div>

    <script>
        class SnakeGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gridSize = 20;
                this.tileCount = this.canvas.width / this.gridSize;
                
                this.snake = [];
                this.direction = { x: 1, y: 0 };
                this.nextDirection = { x: 1, y: 0 };
                this.food = { x: 0, y: 0 };
                this.score = 0;
                this.best = parseInt(localStorage.getItem('snakeBestScore')) || 0;
                this.gameOver = false;
                this.canTurn = true;
                this.gameLoop = null;
                this.isBoosting = false;
                this.boostSpeed = 40;
                this.normalSpeed = 120;
                
                this.init();
            }

            init() {
                this.snake = [
                    { x: 10, y: 10 },
                    { x: 9, y: 10 },
                    { x: 8, y: 10 }
                ];
                this.direction = { x: 1, y: 0 };
                this.nextDirection = { x: 1, y: 0 };
                this.score = 0;
                this.gameOver = false;
                this.canTurn = true;
                this.isBoosting = false;
                
                this.spawnFood();
                this.updateScore();
                this.startGameLoop();
            }

            startGameLoop() {
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                }
                const speed = this.isBoosting ? this.boostSpeed : this.normalSpeed;
                this.gameLoop = setInterval(() => {
                    this.update();
                    this.draw();
                }, speed);
            }

            setNormalSpeed() {
                this.normalSpeed = 120;
                if (!this.isBoosting && !this.gameOver) {
                    this.startGameLoop();
                }
            }

            setBoosting(boosting) {
                if (this.isBoosting === boosting) return;
                this.isBoosting = boosting;
                const indicator = document.getElementById('boostIndicator');
                if (boosting) {
                    indicator.classList.add('show');
                } else {
                    indicator.classList.remove('show');
                }
                if (!this.gameOver) {
                    this.startGameLoop();
                }
            }

            spawnFood() {
                let validPosition = false;
                while (!validPosition) {
                    this.food = {
                        x: Math.floor(Math.random() * this.tileCount),
                        y: Math.floor(Math.random() * this.tileCount)
                    };
                    validPosition = !this.snake.some(segment => 
                        segment.x === this.food.x && segment.y === this.food.y
                    );
                }
            }

            update() {
                if (this.gameOver) return;
                
                this.direction = { ...this.nextDirection };
                this.canTurn = true;
                
                const head = {
                    x: this.snake[0].x + this.direction.x,
                    y: this.snake[0].y + this.direction.y
                };

                if (this.checkCollision(head)) {
                    this.endGame();
                    return;
                }

                this.snake.unshift(head);

                if (head.x === this.food.x && head.y === this.food.y) {
                    this.score += 10;
                    this.updateScore();
                    this.spawnFood();
                } else {
                    this.snake.pop();
                }
            }

            checkCollision(head) {
                if (head.x < 0 || head.x >= this.tileCount ||
                    head.y < 0 || head.y >= this.tileCount) {
                    return true;
                }
                return this.snake.some(segment => 
                    segment.x === head.x && segment.y === head.y
                );
            }

            endGame() {
                this.gameOver = true;
                clearInterval(this.gameLoop);
                document.getElementById('boostIndicator').classList.remove('show');
                
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('snakeBestScore', this.best);
                    document.getElementById('best').textContent = this.best;
                }
                
                this.saveScoreToHistory();
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').classList.add('show');
            }

            saveScoreToHistory() {
                const history = SnakeGame.getHistory();
                const record = {
                    score: this.score,
                    date: new Date().toISOString()
                };
                history.push(record);
                history.sort((a, b) => b.score - a.score);
                const top10 = history.slice(0, 10);
                localStorage.setItem('snakeHistory', JSON.stringify(top10));
            }

            static getHistory() {
                const stored = localStorage.getItem('snakeHistory');
                return stored ? JSON.parse(stored) : [];
            }

            static clearHistory() {
                localStorage.removeItem('snakeHistory');
            }

            updateScore() {
                document.getElementById('score').textContent = this.score;
            }

            draw() {
                this.ctx.fillStyle = '#1e1e1e';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                this.drawGrid();
                this.drawSnake();
                this.drawFood();
            }

            drawGrid() {
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                this.ctx.lineWidth = 1;
                
                for (let i = 0; i <= this.tileCount; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.gridSize, 0);
                    this.ctx.lineTo(i * this.gridSize, this.canvas.height);
                    this.ctx.stroke();
                    
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.gridSize);
                    this.ctx.lineTo(this.canvas.width, i * this.gridSize);
                    this.ctx.stroke();
                }
            }

            drawSnake() {
                this.snake.forEach((segment, index) => {
                    const gradient = this.ctx.createLinearGradient(
                        segment.x * this.gridSize,
                        segment.y * this.gridSize,
                        (segment.x + 1) * this.gridSize,
                        (segment.y + 1) * this.gridSize
                    );
                    
                    if (index === 0) {
                        gradient.addColorStop(0, '#00ff88');
                        gradient.addColorStop(1, '#00cc6a');
                    } else {
                        const alpha = 1 - (index / this.snake.length) * 0.5;
                        gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
                        gradient.addColorStop(1, `rgba(0, 204, 106, ${alpha})`);
                    }
                    
                    this.ctx.fillStyle = gradient;
                    this.ctx.shadowColor = '#00ff88';
                    this.ctx.shadowBlur = index === 0 ? 15 : 5;
                    
                    this.drawRoundedRect(
                        segment.x * this.gridSize + 2,
                        segment.y * this.gridSize + 2,
                        this.gridSize - 4,
                        this.gridSize - 4,
                        6
                    );
                    
                    this.ctx.shadowBlur = 0;
                });

                const head = this.snake[0];
                this.ctx.fillStyle = '#1a1a2e';
                this.ctx.shadowBlur = 0;
                
                const eyeOffset = 4;
                const eyeSize = 3;
                
                if (this.direction.x === 1) {
                    this.ctx.beginPath();
                    this.ctx.arc(
                        head.x * this.gridSize + this.gridSize - eyeOffset,
                        head.y * this.gridSize + eyeOffset + 3,
                        eyeSize, 0, Math.PI * 2
                    );
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.arc(
                        head.x * this.gridSize + this.gridSize - eyeOffset,
                        head.y * this.gridSize + this.gridSize - eyeOffset - 3,
                        eyeSize, 0, Math.PI * 2
                    );
                    this.ctx.fill();
                } else if (this.direction.x === -1) {
                    this.ctx.beginPath();
                    this.ctx.arc(
                        head.x * this.gridSize + eyeOffset,
                        head.y * this.gridSize + eyeOffset + 3,
                        eyeSize, 0, Math.PI * 2
                    );
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.arc(
                        head.x * this.gridSize + eyeOffset,
                        head.y * this.gridSize + this.gridSize - eyeOffset - 3,
                        eyeSize, 0, Math.PI * 2
                    );
                    this.ctx.fill();
                } else if (this.direction.y === 1) {
                    this.ctx.beginPath();
                    this.ctx.arc(
                        head.x * this.gridSize + eyeOffset + 3,
                        head.y * this.gridSize + this.gridSize - eyeOffset,
                        eyeSize, 0, Math.PI * 2
                    );
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.arc(
                        head.x * this.gridSize + this.gridSize - eyeOffset - 3,
                        head.y * this.gridSize + this.gridSize - eyeOffset,
                        eyeSize, 0, Math.PI * 2
                    );
                    this.ctx.fill();
                } else {
                    this.ctx.beginPath();
                    this.ctx.arc(
                        head.x * this.gridSize + eyeOffset + 3,
                        head.y * this.gridSize + eyeOffset,
                        eyeSize, 0, Math.PI * 2
                    );
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.arc(
                        head.x * this.gridSize + this.gridSize - eyeOffset - 3,
                        head.y * this.gridSize + eyeOffset,
                        eyeSize, 0, Math.PI * 2
                    );
                    this.ctx.fill();
                }
            }

            drawFood() {
                const centerX = this.food.x * this.gridSize + this.gridSize / 2;
                const centerY = this.food.y * this.gridSize + this.gridSize / 2;
                const radius = this.gridSize / 2 - 4;
                
                const gradient = this.ctx.createRadialGradient(
                    centerX, centerY, 0,
                    centerX, centerY, radius
                );
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(1, '#ff4757');
                
                this.ctx.fillStyle = gradient;
                this.ctx.shadowColor = '#ff4757';
                this.ctx.shadowBlur = 15;
                
                this.ctx.beginPath();
                this.ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.shadowBlur = 0;
                
                this.ctx.fillStyle = '#ffffff';
                this.ctx.font = 'bold 14px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText('★', centerX, centerY);
            }

            drawRoundedRect(x, y, width, height, radius) {
                this.ctx.beginPath();
                this.ctx.moveTo(x + radius, y);
                this.ctx.lineTo(x + width - radius, y);
                this.ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                this.ctx.lineTo(x + width, y + height - radius);
                this.ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                this.ctx.lineTo(x + radius, y + height);
                this.ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                this.ctx.lineTo(x, y + radius);
                this.ctx.quadraticCurveTo(x, y, x + radius, y);
                this.ctx.closePath();
                this.ctx.fill();
            }

            handleKeyDown(key) {
                if (!this.canTurn) return;
                
                const keyMap = {
                    'ArrowUp': { x: 0, y: -1 },
                    'ArrowDown': { x: 0, y: 1 },
                    'ArrowLeft': { x: -1, y: 0 },
                    'ArrowRight': { x: 1, y: 0 },
                    'w': { x: 0, y: -1 },
                    'W': { x: 0, y: -1 },
                    's': { x: 0, y: 1 },
                    'S': { x: 0, y: 1 },
                    'a': { x: -1, y: 0 },
                    'A': { x: -1, y: 0 },
                    'd': { x: 1, y: 0 },
                    'D': { x: 1, y: 0 }
                };
                
                const newDirection = keyMap[key];
                if (!newDirection) return;
                
                if (newDirection.x !== -this.direction.x && 
                    newDirection.y !== -this.direction.y) {
                    this.nextDirection = newDirection;
                    this.canTurn = false;
                }
            }
        }

        const game = new SnakeGame();

        document.getElementById('newGameBtn').addEventListener('click', () => {
            document.getElementById('gameOver').classList.remove('show');
            game.init();
        });

        document.getElementById('retryBtn').addEventListener('click', () => {
            document.getElementById('gameOver').classList.remove('show');
            game.init();
        });

        let boostKeysPressed = new Map();
        let boostTimeout = null;
        const BOOST_DELAY = 1500;

        function updateBoostState() {
            let shouldBoost = false;
            const now = Date.now();
            
            for (const [key, pressTime] of boostKeysPressed) {
                if (key === 'space' || boostKeysPressed.has('ArrowUp') || boostKeysPressed.has('ArrowDown') || 
                    boostKeysPressed.has('ArrowLeft') || boostKeysPressed.has('ArrowRight') ||
                    boostKeysPressed.has('w') || boostKeysPressed.has('W') || boostKeysPressed.has('a') || 
                    boostKeysPressed.has('A') || boostKeysPressed.has('s') || boostKeysPressed.has('S') || 
                    boostKeysPressed.has('d') || boostKeysPressed.has('D')) {
                    if (now - pressTime >= BOOST_DELAY) {
                        shouldBoost = true;
                        break;
                    }
                }
            }
            
            game.setBoosting(shouldBoost);
        }

        document.addEventListener('keydown', (e) => {
            const directionKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 'a', 'A', 's', 'S', 'd', 'D'];
            
            if (directionKeys.includes(e.key) || e.key === ' ') {
                if (!boostKeysPressed.has(e.key)) {
                    boostKeysPressed.set(e.key, Date.now());
                }
                
                if (boostTimeout) clearInterval(boostTimeout);
                boostTimeout = setInterval(updateBoostState, 100);
            }
            
            if (e.key === ' ') {
                e.preventDefault();
            }
            
            game.handleKeyDown(e.key);
        });

        document.addEventListener('keyup', (e) => {
            const directionKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 'a', 'A', 's', 'S', 'd', 'D'];
            
            if (directionKeys.includes(e.key) || e.key === ' ') {
                boostKeysPressed.delete(e.key);
                
                if (boostKeysPressed.size === 0 && boostTimeout) {
                    clearInterval(boostTimeout);
                    boostTimeout = null;
                    game.setBoosting(false);
                }
            }
        });

        window.addEventListener('blur', () => {
            boostKeysPressed.clear();
            if (boostTimeout) {
                clearInterval(boostTimeout);
                boostTimeout = null;
            }
            game.setBoosting(false);
        });

        function formatDate(dateString) {
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        function renderHistory() {
            const history = SnakeGame.getHistory();
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            if (history.length === 0) {
                historyList.innerHTML = '<li class="history-empty">暂无记录</li>';
                return;
            }

            history.forEach((record, index) => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span class="rank ${index < 3 ? 'top3' : ''}">${index + 1}</span>
                    <span class="score">${record.score}</span>
                    <span class="date">${formatDate(record.date)}</span>
                `;
                historyList.appendChild(li);
            });
        }

        const historyModal = document.getElementById('historyModal');

        document.getElementById('historyBtn').addEventListener('click', () => {
            renderHistory();
            historyModal.classList.add('show');
        });

        document.getElementById('closeHistoryBtn').addEventListener('click', () => {
            historyModal.classList.remove('show');
        });

        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            if (confirm('确定要清空所有记录吗？')) {
                SnakeGame.clearHistory();
                renderHistory();
            }
        });

        historyModal.addEventListener('click', (e) => {
            if (e.target === historyModal) {
                historyModal.classList.remove('show');
            }
        });
    </script>
</body>
</html>
