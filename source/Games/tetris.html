<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        h1 {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(138, 43, 226, 0.6);
            background: linear-gradient(135deg, #ff6b6b, #ffa500, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-wrapper {
            display: flex;
            gap: 25px;
        }

        .game-board {
            position: relative;
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid rgba(138, 43, 226, 0.5);
            border-radius: 8px;
            padding: 3px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.3);
        }

        canvas {
            display: block;
            background: #0a0a15;
            border-radius: 5px;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 140px;
        }

        .panel-box {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(138, 43, 226, 0.4);
            border-radius: 10px;
            padding: 15px;
        }

        .panel-box h3 {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .panel-box .value {
            font-size: 28px;
            font-weight: bold;
            color: #ffa500;
        }

        #nextCanvas {
            display: block;
            margin: 0 auto;
            background: #0a0a15;
            border-radius: 5px;
        }

        .controls {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .controls p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin: 5px 0;
        }

        .controls span {
            display: inline-block;
            background: rgba(138, 43, 226, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            color: #da70d6;
            font-family: monospace;
            font-size: 11px;
            margin: 0 2px;
        }

        .btn {
            background: linear-gradient(135deg, #8a2be2, #9932cc);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.4);
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(138, 43, 226, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary:hover {
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            font-size: 36px;
            color: #ff6b6b;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .game-over p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .game-over p span {
            color: #ffa500;
            font-weight: bold;
            font-size: 24px;
        }

        .history-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .history-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .history-panel {
            background: linear-gradient(135deg, #1a1a3e, #2d1b4e);
            border-radius: 16px;
            padding: 30px;
            min-width: 350px;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(138, 43, 226, 0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .history-modal.show .history-panel {
            transform: scale(1);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .history-header h2 {
            font-size: 26px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            padding: 0 10px;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: white;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 320px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: background 0.2s, transform 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .history-item .rank {
            font-weight: bold;
            color: rgba(255, 255, 255, 0.5);
            width: 30px;
            font-size: 14px;
        }

        .history-item .rank.top3 {
            color: #ffd700;
            font-size: 18px;
        }

        .history-item .score {
            font-size: 20px;
            font-weight: bold;
            color: #ffa500;
            flex: 1;
            text-align: left;
            padding-left: 15px;
        }

        .history-item .date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .history-empty {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            padding: 50px 0;
            font-size: 16px;
        }

        .clear-history-btn {
            width: 100%;
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .clear-history-btn:hover {
            background: rgba(255, 107, 107, 0.3);
        }

        .level-indicator {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .level-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
        }

        .level-dot.active {
            background: #8a2be2;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <h1>🎮 俄罗斯方块</h1>
            <div class="game-wrapper">
                <div class="game-board">
                    <canvas id="gameCanvas" width="250" height="500"></canvas>
                    <div class="game-over" id="gameOver">
                        <h2>游戏结束!</h2>
                        <p>最终分数: <span id="finalScore">0</span></p>
                        <button class="btn" id="retryBtn">再来一局</button>
                    </div>
                </div>
                <div class="side-panel">
                    <div class="panel-box">
                        <h3>分数</h3>
                        <div class="value" id="score">0</div>
                    </div>
                    <div class="panel-box">
                        <h3>最高分</h3>
                        <div class="value" id="best">0</div>
                    </div>
                    <div class="panel-box">
                        <h3>下一个</h3>
                        <canvas id="nextCanvas" width="100" height="100"></canvas>
                    </div>
                    <div class="panel-box">
                        <h3>等级</h3>
                        <div class="value" id="level">1</div>
                        <div class="level-indicator" id="levelIndicator">
                            <div class="level-dot active"></div>
                            <div class="level-dot"></div>
                            <div class="level-dot"></div>
                            <div class="level-dot"></div>
                            <div class="level-dot"></div>
                        </div>
                    </div>
                    <button class="btn" id="newGameBtn">新游戏</button>
                    <button class="btn btn-secondary" id="historyBtn">🏆 排行榜</button>
                </div>
            </div>
            <div class="controls">
                <p><span>←</span><span>→</span> 左右移动 | <span>↑</span> 旋转 | <span>↓</span> 加速下落</p>
                <p><span>空格</span> 快速落地 | <span>P</span> 暂停</p>
            </div>
        </div>
    </div>

    <div class="history-modal" id="historyModal">
        <div class="history-panel">
            <div class="history-header">
                <h2>🏆 排行榜</h2>
                <button class="close-btn" id="closeHistoryBtn">&times;</button>
            </div>
            <ul class="history-list" id="historyList">
                <li class="history-empty">暂无记录</li>
            </ul>
            <button class="clear-history-btn" id="clearHistoryBtn">清空记录</button>
        </div>
    </div>

    <script>
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('nextCanvas');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                this.cols = 10;
                this.rows = 20;
                this.blockSize = 25;
                
                this.board = [];
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.best = parseInt(localStorage.getItem('tetrisBestScore')) || 0;
                this.gameOver = false;
                this.paused = false;
                this.dropInterval = null;
                this.isDropping = false;
                
                this.shapes = [
                    { name: 'I', color: '#00f5ff', shape: [[1,1,1,1]] },
                    { name: 'O', color: '#ffff00', shape: [[1,1],[1,1]] },
                    { name: 'T', color: '#da70d6', shape: [[0,1,0],[1,1,1]] },
                    { name: 'S', color: '#00ff00', shape: [[0,1,1],[1,1,0]] },
                    { name: 'Z', color: '#ff0000', shape: [[1,1,0],[0,1,1]] },
                    { name: 'J', color: '#0000ff', shape: [[1,0,0],[1,1,1]] },
                    { name: 'L', color: '#ff8c00', shape: [[0,0,1],[1,1,1]] }
                ];
                
                this.init();
            }

            init() {
                this.board = Array(this.rows).fill(null).map(() => Array(this.cols).fill(0));
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameOver = false;
                this.paused = false;
                this.isDropping = false;
                
                if (this.dropInterval) {
                    clearInterval(this.dropInterval);
                }
                
                this.nextPiece = this.createPiece();
                this.spawnPiece();
                this.updateScore();
                this.updateLevel();
                this.startDropping();
                this.draw();
            }

            createPiece() {
                const shape = this.shapes[Math.floor(Math.random() * this.shapes.length)];
                return {
                    shape: shape.shape.map(row => [...row]),
                    color: shape.color,
                    name: shape.name,
                    x: Math.floor((this.cols - shape.shape[0].length) / 2),
                    y: 0
                };
            }

            spawnPiece() {
                this.currentPiece = this.nextPiece;
                this.currentPiece.x = Math.floor((this.cols - this.currentPiece.shape[0].length) / 2);
                this.currentPiece.y = 0;
                this.nextPiece = this.createPiece();
                this.drawNextPiece();
                
                if (this.checkCollision(0, 0)) {
                    this.endGame();
                }
            }

            startDropping() {
                const speed = this.getDropSpeed();
                this.dropInterval = setInterval(() => {
                    if (!this.paused && !this.gameOver) {
                        this.drop();
                    }
                }, speed);
            }

            getDropSpeed() {
                return Math.max(50, 500 - (this.level - 1) * 50);
            }

            checkCollision(offsetX, offsetY, shape = null) {
                const piece = shape || this.currentPiece.shape;
                for (let r = 0; r < piece.length; r++) {
                    for (let c = 0; c < piece[r].length; c++) {
                        if (piece[r][c]) {
                            const newX = this.currentPiece.x + c + offsetX;
                            const newY = this.currentPiece.y + r + offsetY;
                            
                            if (newX < 0 || newX >= this.cols || newY >= this.rows) {
                                return true;
                            }
                            if (newY >= 0 && this.board[newY][newX]) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            move(dx) {
                if (!this.checkCollision(dx, 0) && !this.gameOver && !this.paused) {
                    this.currentPiece.x += dx;
                    this.draw();
                }
            }

            rotate() {
                if (this.gameOver || this.paused) return;
                
                const rotated = this.currentPiece.shape[0].map((_, i) =>
                    this.currentPiece.shape.map(row => row[i]).reverse()
                );
                
                if (!this.checkCollision(0, 0, rotated)) {
                    this.currentPiece.shape = rotated;
                    this.draw();
                }
            }

            drop() {
                if (this.gameOver || this.paused) return;
                
                if (!this.checkCollision(0, 1)) {
                    this.currentPiece.y++;
                    this.draw();
                } else {
                    this.lockPiece();
                }
            }

            hardDrop() {
                if (this.gameOver || this.paused) return;
                
                this.isDropping = true;
                while (!this.checkCollision(0, 1)) {
                    this.currentPiece.y++;
                }
                this.lockPiece();
                this.isDropping = false;
            }

            lockPiece() {
                for (let r = 0; r < this.currentPiece.shape.length; r++) {
                    for (let c = 0; c < this.currentPiece.shape[r].length; c++) {
                        if (this.currentPiece.shape[r][c]) {
                            const boardY = this.currentPiece.y + r;
                            const boardX = this.currentPiece.x + c;
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = this.currentPiece.color;
                            }
                        }
                    }
                }
                
                this.clearLines();
                this.spawnPiece();
                this.draw();
            }

            clearLines() {
                let linesCleared = 0;
                
                for (let r = this.rows - 1; r >= 0; r--) {
                    if (this.board[r].every(cell => cell !== 0)) {
                        this.board.splice(r, 1);
                        this.board.unshift(Array(this.cols).fill(0));
                        linesCleared++;
                        r++;
                    }
                }
                
                if (linesCleared > 0) {
                    const points = [0, 100, 300, 500, 800];
                    this.score += points[linesCleared] * this.level;
                    this.lines += linesCleared;
                    
                    const newLevel = Math.floor(this.lines / 10) + 1;
                    if (newLevel > this.level) {
                        this.level = newLevel;
                        this.updateLevel();
                        this.restartDropInterval();
                    }
                    
                    this.updateScore();
                }
            }

            restartDropInterval() {
                if (this.dropInterval) {
                    clearInterval(this.dropInterval);
                }
                this.startDropping();
            }

            updateScore() {
                document.getElementById('score').textContent = this.score;
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('tetrisBestScore', this.best);
                }
                document.getElementById('best').textContent = this.best;
            }

            updateLevel() {
                document.getElementById('level').textContent = this.level;
                
                const dots = document.querySelectorAll('.level-dot');
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i < this.level && i < 5);
                });
            }

            endGame() {
                this.gameOver = true;
                clearInterval(this.dropInterval);
                
                this.saveScoreToHistory();
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').classList.add('show');
            }

            saveScoreToHistory() {
                const history = TetrisGame.getHistory();
                const record = {
                    score: this.score,
                    date: new Date().toISOString()
                };
                history.push(record);
                history.sort((a, b) => b.score - a.score);
                const top10 = history.slice(0, 10);
                localStorage.setItem('tetrisHistory', JSON.stringify(top10));
            }

            static getHistory() {
                const stored = localStorage.getItem('tetrisHistory');
                return stored ? JSON.parse(stored) : [];
            }

            static clearHistory() {
                localStorage.removeItem('tetrisHistory');
            }

            togglePause() {
                if (this.gameOver) return;
                this.paused = !this.paused;
            }

            draw() {
                this.ctx.fillStyle = '#0a0a15';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.drawGrid();
                this.drawBoard();
                this.drawPiece();
            }

            drawGrid() {
                this.ctx.strokeStyle = 'rgba(138, 43, 226, 0.1)';
                this.ctx.lineWidth = 1;
                
                for (let i = 0; i <= this.cols; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.blockSize, 0);
                    this.ctx.lineTo(i * this.blockSize, this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let i = 0; i <= this.rows; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.blockSize);
                    this.ctx.lineTo(this.canvas.width, i * this.blockSize);
                    this.ctx.stroke();
                }
            }

            drawBoard() {
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        if (this.board[r][c]) {
                            this.drawBlock(c, r, this.board[r][c]);
                        }
                    }
                }
            }

            drawPiece() {
                if (!this.currentPiece) return;
                
                for (let r = 0; r < this.currentPiece.shape.length; r++) {
                    for (let c = 0; c < this.currentPiece.shape[r].length; c++) {
                        if (this.currentPiece.shape[r][c]) {
                            const y = this.currentPiece.y + r;
                            if (y >= 0) {
                                this.drawBlock(this.currentPiece.x + c, y, this.currentPiece.color);
                            }
                        }
                    }
                }
            }

            drawBlock(x, y, color) {
                const px = x * this.blockSize;
                const py = y * this.blockSize;
                const size = this.blockSize - 1;
                
                const gradient = this.ctx.createLinearGradient(px, py, px + size, py + size);
                gradient.addColorStop(0, color);
                gradient.addColorStop(1, this.darkenColor(color));
                
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(px + 1, py + 1, size - 1, size - 1);
                
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                this.ctx.fillRect(px + 1, py + 1, size - 1, 3);
                this.ctx.fillRect(px + 1, py + 1, 3, size - 1);
                
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                this.ctx.fillRect(px + 1, py + size - 4, size - 1, 3);
                this.ctx.fillRect(px + size - 4, py + 1, 3, size - 1);
            }

            darkenColor(color) {
                const r = parseInt(color.slice(1, 3), 16);
                const g = parseInt(color.slice(3, 5), 16);
                const b = parseInt(color.slice(5, 7), 16);
                return `rgb(${Math.floor(r * 0.6)}, ${Math.floor(g * 0.6)}, ${Math.floor(b * 0.6)})`;
            }

            drawNextPiece() {
                this.nextCtx.fillStyle = '#0a0a15';
                this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                
                if (!this.nextPiece) return;
                
                const blockSize = 22;
                const offsetX = (this.nextCanvas.width - this.nextPiece.shape[0].length * blockSize) / 2;
                const offsetY = (this.nextCanvas.height - this.nextPiece.shape.length * blockSize) / 2;
                
                for (let r = 0; r < this.nextPiece.shape.length; r++) {
                    for (let c = 0; c < this.nextPiece.shape[r].length; c++) {
                        if (this.nextPiece.shape[r][c]) {
                            const px = offsetX + c * blockSize;
                            const py = offsetY + r * blockSize;
                            const size = blockSize - 1;
                            
                            this.nextCtx.fillStyle = this.nextPiece.color;
                            this.nextCtx.fillRect(px + 1, py + 1, size - 1, size - 1);
                        }
                    }
                }
            }
        }

        const game = new TetrisGame();

        document.getElementById('newGameBtn').addEventListener('click', () => {
            document.getElementById('gameOver').classList.remove('show');
            game.init();
        });

        document.getElementById('retryBtn').addEventListener('click', () => {
            document.getElementById('gameOver').classList.remove('show');
            game.init();
        });

        document.addEventListener('keydown', (e) => {
            if (game.gameOver) return;
            
            switch (e.key) {
                case 'ArrowLeft':
                    game.move(-1);
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    game.move(1);
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    game.drop();
                    e.preventDefault();
                    break;
                case 'ArrowUp':
                    game.rotate();
                    e.preventDefault();
                    break;
                case ' ':
                    game.hardDrop();
                    e.preventDefault();
                    break;
                case 'p':
                case 'P':
                    game.togglePause();
                    break;
            }
        });

        function formatDate(dateString) {
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        function renderHistory() {
            const history = TetrisGame.getHistory();
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            if (history.length === 0) {
                historyList.innerHTML = '<li class="history-empty">暂无记录</li>';
                return;
            }

            history.forEach((record, index) => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span class="rank ${index < 3 ? 'top3' : ''}">${index + 1}</span>
                    <span class="score">${record.score}</span>
                    <span class="date">${formatDate(record.date)}</span>
                `;
                historyList.appendChild(li);
            });
        }

        const historyModal = document.getElementById('historyModal');

        document.getElementById('historyBtn').addEventListener('click', () => {
            renderHistory();
            historyModal.classList.add('show');
        });

        document.getElementById('closeHistoryBtn').addEventListener('click', () => {
            historyModal.classList.remove('show');
        });

        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            if (confirm('确定要清空所有记录吗？')) {
                TetrisGame.clearHistory();
                renderHistory();
            }
        });

        historyModal.addEventListener('click', (e) => {
            if (e.target === historyModal) {
                historyModal.classList.remove('show');
            }
        });
    </script>
</body>
</html>
