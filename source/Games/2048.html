<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #faf8ef;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 64px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .header {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            background: #bbada0;
            padding: 10px 25px;
            border-radius: 6px;
            color: #eee4da;
            min-width: 100px;
        }

        .score-box .label {
            font-size: 13px;
            text-transform: uppercase;
        }

        .score-box .value {
            font-size: 25px;
            font-weight: bold;
            color: white;
        }

        .new-game-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .new-game-btn:hover {
            background: #7a6658;
        }

        .game-board {
            background: #bbada0;
            border-radius: 8px;
            padding: 12px;
            display: inline-block;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 12px;
        }

        .cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
        }

        .tile {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: bold;
            transition: top 0.15s, left 0.15s;
        }

        .tile-new {
            animation: pop-in 0.2s ease;
        }

        .tile-merged {
            animation: merge-pop 0.2s ease;
        }

        @keyframes pop-in {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes merge-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 40px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 40px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 40px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 35px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 35px; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 30px; }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.9);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            font-size: 48px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 18px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .instructions {
            margin-top: 20px;
            color: #776e65;
            font-size: 14px;
        }

        .instructions p {
            margin: 5px 0;
        }

        .history-btn {
            background: #6ab04c;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-btn:hover {
            background: #5a903c;
        }

        .history-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .history-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .history-panel {
            background: #faf8ef;
            border-radius: 12px;
            padding: 24px;
            min-width: 320px;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .history-modal.show .history-panel {
            transform: scale(1);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .history-header h2 {
            font-size: 28px;
            color: #776e65;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #776e65;
            cursor: pointer;
            padding: 0 10px;
        }

        .close-btn:hover {
            color: #333;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #eee4da;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: #ede0c8;
        }

        .history-item.rank {
            font-weight: bold;
            color: #776e65;
            width: 30px;
        }

        .history-item.rank.top3 {
            color: #f65e3b;
        }

        .history-item.score {
            font-size: 18px;
            font-weight: bold;
            color: #776e65;
        }

        .history-item.date {
            font-size: 14px;
            color: #a39489;
        }

        .history-empty {
            text-align: center;
            color: #a39489;
            padding: 40px 0;
        }

        .clear-history-btn {
            width: 100%;
            background: #f65e3b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .clear-history-btn:hover {
            background: #e54e2b;
        }

        @media (max-width: 520px) {
            .grid {
                grid-template-columns: repeat(4, 70px);
                grid-template-rows: repeat(4, 70px);
                gap: 8px;
            }
            .tile {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
            h1 {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <div class="header">
            <div class="score-box">
                <div class="label">分数</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">最高分</div>
                <div class="value" id="best">0</div>
            </div>
            <button class="new-game-btn" id="newGameBtn">新游戏</button>
            <button class="history-btn" id="historyBtn">🏆 排行榜</button>
        </div>
        <div class="game-board" id="board">
            <div class="grid">
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
            <div class="game-over" id="gameOver">
                <h2>游戏结束!</h2>
                <p>最终分数: <span id="finalScore">0</span></p>
                <button class="new-game-btn" id="retryBtn">再玩一次</button>
            </div>
        </div>
        <div class="history-modal" id="historyModal">
            <div class="history-panel">
                <div class="history-header">
                    <h2>🏆 排行榜</h2>
                    <button class="close-btn" id="closeHistoryBtn">&times;</button>
                </div>
                <ul class="history-list" id="historyList">
                    <li class="history-empty">暂无记录</li>
                </ul>
                <button class="clear-history-btn" id="clearHistoryBtn">清空记录</button>
            </div>
        </div>
        <div class="instructions">
            <p>使用 <strong>方向键</strong> 或 <strong>滑动</strong> 来移动方块</p>
            <p>相同数字的方块碰撞时会合并成它们的和</p>
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.score = 0;
                this.best = parseInt(localStorage.getItem('best2048')) || 0;
                this.gameOver = false;
                this.isAnimating = false;
                this.tileId = 0;
                this.gap = 12;
                this.cellSize = 100;
                this.tiles = [];
                this.init();
            }

            init() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.gameOver = false;
                this.isAnimating = false;
                this.tiles = [];
                this.tileId = 0;
                this.updateScore();
                document.getElementById('best').textContent = this.best;
                document.getElementById('gameOver').classList.remove('show');
                this.clearBoard();
                this.addRandomTile();
                this.addRandomTile();
                this.renderBoard();
            }

            restart() {
                this.init();
            }

            clearBoard() {
                const board = document.getElementById('board');
                const tiles = board.querySelectorAll('.tile');
                tiles.forEach(tile => tile.remove());
            }

            getCellPos(row, col) {
                return {
                    top: row * (this.cellSize + this.gap) + this.gap,
                    left: col * (this.cellSize + this.gap) + this.gap
                };
            }

            createTile(row, col, value, isNew, isMerged) {
                const board = document.getElementById('board');
                const tile = document.createElement('div');
                const id = ++this.tileId;
                tile.id = 'tile-' + id;
                tile.className = 'tile tile-' + (value > 2048 ? 'super' : value);
                if (isNew) tile.classList.add('tile-new');
                if (isMerged) tile.classList.add('tile-merged');
                tile.textContent = value;
                const pos = this.getCellPos(row, col);
                tile.style.top = pos.top + 'px';
                tile.style.left = pos.left + 'px';
                board.appendChild(tile);
                this.tiles.push({ id, row, col, value, element: tile });
                return id;
            }

            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === 0) {
                            emptyCells.push({ r, c });
                        }
                    }
                }
                if (emptyCells.length > 0) {
                    const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.grid[r][c] = Math.random() < 0.9 ? 2 : 4;
                    return { r, c, value: this.grid[r][c] };
                }
                return null;
            }

            renderBoard() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] !== 0) {
                            const existingTile = this.tiles.find(t => t.row === r && t.col === c);
                            if (existingTile) {
                                const pos = this.getCellPos(r, c);
                                existingTile.element.style.top = pos.top + 'px';
                                existingTile.element.style.left = pos.left + 'px';
                                if (parseInt(existingTile.element.textContent) !== this.grid[r][c]) {
                                    existingTile.element.textContent = this.grid[r][c];
                                    existingTile.element.className = 'tile tile-' + (this.grid[r][c] > 2048 ? 'super' : this.grid[r][c]);
                                }
                                existingTile.value = this.grid[r][c];
                            } else {
                                this.createTile(r, c, this.grid[r][c], true, false);
                            }
                        }
                    }
                }
            }

            move(direction) {
                if (this.gameOver || this.isAnimating) return false;

                const vector = { up: { r: -1, c: 0 }, down: { r: 1, c: 0 }, left: { r: 0, c: -1 }, right: { r: 0, c: 1 } };
                const v = vector[direction];
                let moved = false;
                const movements = [];
                const mergedCells = [];

                const traversals = this.buildTraversals(v);

                for (const r of traversals.r) {
                    for (const c of traversals.c) {
                        const value = this.grid[r][c];
                        if (value === 0) continue;

                        const { farthest, next } = this.findFarthestPosition(r, c, v);

                        if (next && this.grid[next.r][next.c] === value) {
                            mergedCells.push({ r: next.r, c: next.c, value: value * 2 });
                            this.grid[r][c] = 0;
                            this.grid[next.r][next.c] = value * 2;
                            movements.push({ fromR: r, fromC: c, toR: next.r, toC: next.c, value: value, merged: true });
                            moved = true;
                        } else if (farthest.r !== r || farthest.c !== c) {
                            this.grid[r][c] = 0;
                            this.grid[farthest.r][farthest.c] = value;
                            movements.push({ fromR: r, fromC: c, toR: farthest.r, toC: farthest.c, value: value, merged: false });
                            moved = true;
                        }
                    }
                }

                if (moved) {
                    this.animateMove(movements, mergedCells);
                }

                return moved;
            }

            buildTraversals(v) {
                const traversals = { r: [], c: [] };
                for (let i = 0; i < this.size; i++) {
                    traversals.r.push(i);
                    traversals.c.push(i);
                }
                if (v.r === 1) traversals.r.reverse();
                if (v.c === 1) traversals.c.reverse();
                return traversals;
            }

            findFarthestPosition(r, c, v) {
                let prev;
                do {
                    prev = { r, c };
                    r += v.r;
                    c += v.c;
                } while (this.withinBounds(r, c) && this.grid[r][c] === 0);

                const next = this.withinBounds(r, c) ? { r, c } : null;
                return { farthest: prev, next };
            }

            withinBounds(r, c) {
                return r >= 0 && r < this.size && c >= 0 && c < this.size;
            }

            animateMove(movements, mergedCells) {
                this.isAnimating = true;

                for (const m of movements) {
                    const tile = this.tiles.find(t => t.row === m.fromR && t.col === m.fromC);
                    if (tile) {
                        const pos = this.getCellPos(m.toR, m.toC);
                        tile.row = m.toR;
                        tile.col = m.toC;
                        tile.element.style.top = pos.top + 'px';
                        tile.element.style.left = pos.left + 'px';
                    }
                }

                setTimeout(() => {
                    this.clearBoard();
                    this.tiles = [];

                    for (const m of mergedCells) {
                        this.score += m.value;
                        this.createTile(m.r, m.c, m.value, false, true);
                    }

                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            if (this.grid[r][c] !== 0) {
                                const isMerged = mergedCells.some(m => m.r === r && m.c === c);
                                if (!isMerged) {
                                    this.createTile(r, c, this.grid[r][c], false, false);
                                }
                            }
                        }
                    }

                    this.addRandomTile();
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            if (this.grid[r][c] !== 0) {
                                const isNew = !this.tiles.some(t => t.row === r && t.col === c);
                                if (isNew) {
                                    this.createTile(r, c, this.grid[r][c], true, false);
                                }
                            }
                        }
                    }

                    this.updateScore();

                    if (this.isGameOver()) {
                        this.gameOver = true;
                        document.getElementById('finalScore').textContent = this.score;
                        document.getElementById('gameOver').classList.add('show');
                        this.saveScoreToHistory();
                    }

                    this.isAnimating = false;
                }, 150);
            }

            saveScoreToHistory() {
                const history = Game2048.getHistory();
                const record = {
                    score: this.score,
                    date: new Date().toISOString()
                };
                history.push(record);
                history.sort((a, b) => b.score - a.score);
                const top10 = history.slice(0, 10);
                localStorage.setItem('game2048History', JSON.stringify(top10));
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('best2048', this.best);
                    document.getElementById('best').textContent = this.best;
                }
            }

            static getHistory() {
                const stored = localStorage.getItem('game2048History');
                return stored ? JSON.parse(stored) : [];
            }

            static clearHistory() {
                localStorage.removeItem('game2048History');
            }

            updateScore() {
                document.getElementById('score').textContent = this.score;
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('best2048', this.best);
                    document.getElementById('best').textContent = this.best;
                }
            }

            isGameOver() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === 0) return false;
                        if (c < this.size - 1 && this.grid[r][c] === this.grid[r][c + 1]) return false;
                        if (r < this.size - 1 && this.grid[r][c] === this.grid[r + 1][c]) return false;
                    }
                }
                return true;
            }
        }

        const game = new Game2048();

        document.getElementById('newGameBtn').addEventListener('click', () => game.restart());
        document.getElementById('retryBtn').addEventListener('click', () => game.restart());

        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'ArrowLeft': 'left',
                'ArrowRight': 'right'
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                game.move(keyMap[e.key]);
            }
        });

        let touchStartX, touchStartY;
        const board = document.getElementById('board');

        board.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        board.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) > 30) {
                if (absDx > absDy) {
                    game.move(dx > 0 ? 'right' : 'left');
                } else {
                    game.move(dy > 0 ? 'down' : 'up');
                }
            }
            touchStartX = null;
            touchStartY = null;
        }, { passive: true });

        function formatDate(dateString) {
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        function renderHistory() {
            const history = Game2048.getHistory();
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            if (history.length === 0) {
                historyList.innerHTML = '<li class="history-empty">暂无记录</li>';
                return;
            }

            history.forEach((record, index) => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span class="history-item rank ${index < 3 ? 'top3' : ''}">${index + 1}</span>
                    <span class="history-item score">${record.score}</span>
                    <span class="history-item date">${formatDate(record.date)}</span>
                `;
                historyList.appendChild(li);
            });
        }

        const historyModal = document.getElementById('historyModal');

        document.getElementById('historyBtn').addEventListener('click', () => {
            renderHistory();
            historyModal.classList.add('show');
        });

        document.getElementById('closeHistoryBtn').addEventListener('click', () => {
            historyModal.classList.remove('show');
        });

        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            if (confirm('确定要清空所有记录吗？')) {
                Game2048.clearHistory();
                renderHistory();
            }
        });

        historyModal.addEventListener('click', (e) => {
            if (e.target === historyModal) {
                historyModal.classList.remove('show');
            }
        });
    </script>
</body>
</html>
