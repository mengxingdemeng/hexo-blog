<light-bulb>
  <div class="glow"></div>

  <svg class="bulb" viewBox="0 0 90 120" id="bulbSvg">
    <defs>
      <radialGradient id="bulbGrad" cx="40%" cy="35%" r="60%">
        <stop offset="0%" stop-color="#fff9c4" id="g0"/>
        <stop offset="100%" stop-color="#f0c030" id="g1"/>
      </radialGradient>
    </defs>
  
    <!-- Glass -->
    <path
          d="M45 8 C20 8 10 28 10 46 C10 62 20 74 32 82 L32 96 C32 100 36 104 45 104 C54 104 58 100 58 96 L58 82 C70 74 80 62 80 46 C80 28 70 8 45 8Z"
          id="glass"
          fill="#2a2a3a"
          stroke="#444"
          stroke-width="1.5"/>
    
    <!-- Filament -->
    <polyline
              id="filament"
              points="38,90 38,70 43,62 47,70 52,62 52,90"
              fill="none"
              stroke="#555"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"/>
   
    <!-- Base ridges -->
    <rect x="32" y="96" width="26" height="5" rx="2" fill="#444" id="base1"/>
    <rect x="34" y="101" width="22" height="5" rx="2" fill="#3a3a3a" id="base2"/>
    <rect x="36" y="106" width="18" height="6" rx="2" fill="#333" id="base3"/>
  </svg>
</light-bulb>

<toggle-switch>
  <input type="checkbox" id="switch" switch="true"/>
  <label for="switch"></label>
</toggle-switch>
