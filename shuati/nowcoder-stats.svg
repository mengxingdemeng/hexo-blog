  <!-- 背景 -->
  <rect width="450" height="220" fill="undefined" rx="14" ry="14"/>
  
  <!-- 标题 -->
  <text x="30" y="40" font-size="22" font-weight="bold" fill="undefined">LeetCode 刷题统计</text>
