name: Deploy Hexo Blog

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点 = 北京时间8点
  push:
    branches:
      - master  # 推送代码时自动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          # 关键：全局安装hexo-cli，确保编译环境完整
          npm install -g hexo-cli

      - name: Generate SVG stats
        run: |
          node scripts/leetcode.js
          node scripts/nowcoder.js

      - name: Commit SVG updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add source/shuati/*.svg
          git commit -m "auto: update stats svg [skip ci]" || echo "No changes to commit"
          git push origin master

      - name: Build Hexo blog (强制完整编译)
        run: |
          hexo clean
          hexo generate
          # 关键：验证编译结果，确保index.html非空
          ls -lh public/
          test -s public/index.html || (echo "index.html is empty, build failed" && exit 1)

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true  # 强制生成干净的gh-pages分支，覆盖旧文件