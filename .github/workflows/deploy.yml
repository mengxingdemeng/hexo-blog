name: Deploy Hexo Blog

on:
  workflow_dispatch:
  schedule:
    - cron: '1 16 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install -g hexo-cli

      - name: Generate Stats SVG
        run: |
          node scripts/leetcode.js
          node scripts/nowcoder.js

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install Python requests
        run: pip install requests -i https://pypi.tuna.tsinghua.edu.cn/simple
        
      - name: Run Vjudge Crawl Script
        run: python scripts/crawl_vjudge.py

      - name: Build Hexo
        run: |
          hexo clean
          hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true

      - name: Sync vjudge-record.json to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: 梦醒的梦/hugo-blog
        run: |
          git config --global user.name "Auto Sync Bot"
          git config --global user.email "bot@gitee.com"
          
          # 清理上次残留目录，避免冲突
          rm -rf gitee-temp || true
          
          # 标准oauth2鉴权格式，引号包裹防特殊字符截断
          git clone "https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git" gitee-temp
          cd gitee-temp
          
          # 确保目标目录存在（关键修复）
          mkdir -p static/data
          
          # -f 强制覆盖目标json
          cp -f ../static/data/vjudge-record.json static/data/
          
          # 提交推送
          git add static/data/vjudge-record.json
          if git diff-index --quiet HEAD; then
            echo "vjudge刷题数据无更新，跳过推送"
            exit 0
          fi
          git commit -m "auto: 更新Vjudge刷题记录 $(date +%Y-%m-%d)"
          git push origin main