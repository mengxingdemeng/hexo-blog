name: Deploy Hexo Blog

on:
  workflow_dispatch:
  schedule:
    - cron: '1 16 * * *'  # 每天 UTC 16:01 = 北京时间 00:01 自动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install -g hexo-cli

      - name: Generate Stats SVG
        run: |
          node scripts/leetcode.js
          node scripts/nowcoder.js

      - name: Build Hexo
        run: |
          hexo clean
          hexo generate
          ls -lh
          ls -lh public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true