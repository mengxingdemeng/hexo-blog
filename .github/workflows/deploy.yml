name: Deploy Hexo Blog

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate SVG
        run: |
          node scripts/leetcode.js
          node scripts/nowcoder.js

      - name: Commit SVG
        run: |
          git config --global user.name "actions"
          git config --global user.email "actions@github.com"
          git add source/shuati/*.svg
          git commit -m "update svg" || exit 0
          git push origin master

      - name: Build Hexo
        run: |
          npx hexo clean
          npx hexo generate

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          publish_dir: ./public