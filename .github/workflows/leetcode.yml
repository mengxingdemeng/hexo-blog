# 这是目前主流、稳定、零报错的官方模板
name: 更新LeetCode数据

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    - cron: '0 0 * * *' # 每天自动运行一次（UTC时间，对应北京时间8点）

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须有写入权限才能提交SVG
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境 (主流博客通用)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 使用稳定版Python

      - name: 安装依赖并生成SVG (使用社区维护的主流脚本)
        run: |
          # 创建图片目录
          mkdir -p source/images
          
          # 下载主流的LeetCode统计脚本（不需要Node，纯Python，更稳定）
          # 这里使用通用性极强的 config 配置方式
          wget -O leetcode_stats.py https://raw.githubusercontent.com/2754LM/leetcode-card/master/bin/leetcard.py
          
          # 执行脚本生成卡片
          python leetcode_stats.py \
            --username "confident-varahamihiracj1" \
            --cn true \
            --theme light \
            --output source/images/leetcode.svg

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add source/images/leetcode.svg
          git commit -m "Auto Update LeetCode Stats" || echo "No changes to commit"
          git push origin master